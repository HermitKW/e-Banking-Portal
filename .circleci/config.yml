# CircleCI pipeline for the Transaction API.
#
# Stage 1: unit tests only (Surefire / *Test) — fast and Docker-free.
# Stage 5 adds an `integration-tests` job on a `machine` executor (Docker available)
# running `./mvnw -B verify` for the Testcontainers integration tests (*IT).
version: 2.1

jobs:
  unit-tests:
    docker:
      - image: cimg/openjdk:21.0
    steps:
      - checkout
      - restore_cache:
          keys:
            - m2-{{ checksum "pom.xml" }}
            - m2-
      - run:
          name: Run unit tests
          command: |
            chmod +x ./mvnw
            ./mvnw -B clean test
      - save_cache:
          key: m2-{{ checksum "pom.xml" }}
          paths:
            - ~/.m2
      - store_test_results:
          path: target/surefire-reports
      - store_artifacts:
          path: target/surefire-reports

workflows:
  build-and-test:
    jobs:
      - unit-tests
