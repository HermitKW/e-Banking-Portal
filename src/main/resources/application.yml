spring:
  application:
    name: transaction-api
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:transaction-api}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

app:
  kafka:
    transactions-topic: ${TRANSACTIONS_TOPIC:transactions}
  ownership:
    # Demo stub for the core Account Service (customer -> owned IBANs).
    # P-0123456789 holds three accounts in different currencies (per the brief's assumption).
    accounts:
      "P-0123456789":
        - "GB29-0000-0000-0000-0001"    # GBP account
        - "DE89-0000-0000-0000-0002"    # EUR account
        - "CH93-0000-0000-0000-0000-0"  # CHF account
  fx:
    base-url: ${FX_BASE_URL:http://localhost:8081}
    connect-timeout: 2s
    read-timeout: 2s
    cache-ttl: 5m
    api-key: ${FX_API_KEY:}
  security:
    # JWKS endpoint of the e-Banking IdP; keys are fetched lazily on first token.
    jwk-set-uri: ${JWT_JWK_SET_URI:http://localhost:9000/.well-known/jwks.json}
    issuer: ${JWT_ISSUER:}
    audience: ${JWT_AUDIENCE:transaction-api}

# Actuator: K8s liveness/readiness probes and a Prometheus scrape endpoint.
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

# Correlation id (X-Request-Id) appears in every log line; structured logs include it as a field.
logging:
  pattern:
    level: "%5p [req:%X{requestId:-}]"

---
# Container profile: emit structured (ECS JSON) logs for log aggregation.
spring:
  config:
    activate:
      on-profile: k8s
logging:
  structured:
    format:
      console: ecs

---
# Live FX rates from the Frankfurter API (ECB). Activate with SPRING_PROFILES_ACTIVE=real-fx.
spring:
  config:
    activate:
      on-profile: real-fx
app:
  fx:
    base-url: https://api.frankfurter.dev
    read-timeout: 5s
