# Local end-to-end stack: the app plus its dependencies (Kafka, a mock OIDC
# provider for real JWTs, and a WireMock FX provider). For local testing/demo
# only — see local/README.md for the run + token recipe.
name: transaction-api-local

services:
  kafka:
    image: apache/kafka:3.8.1
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"

  # Mock OIDC provider: serves a JWKS and issues real (signed) JWTs. Config is baked into the
  # image (no host bind mount) to avoid Docker Desktop's WSL2 mount bug.
  mock-oauth2:
    build: ./local/mock-oauth2
    container_name: mock-oauth2
    ports:
      - "8090:8080"
    environment:
      JSON_CONFIG_PATH: /config.json

  # WireMock standing in for the third-party FX provider. Mappings are baked into the image
  # (no host bind mount) to avoid Docker Desktop's WSL2 mount bug.
  fx:
    build: ./local/wiremock
    container_name: fx
    ports:
      - "8081:8080"

  app:
    build: .
    image: transaction-api:0.0.1-SNAPSHOT
    container_name: transaction-api
    depends_on:
      - kafka
      - mock-oauth2
      - fx
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: "${APP_PROFILE:-}"   # empty = stub (default); set APP_PROFILE=real-fx for live ECB rates
      KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
      TRANSACTIONS_TOPIC: "transactions"
      FX_BASE_URL: "http://fx:8080"
      FX_API_KEY: "local-dev-key"
      JWT_JWK_SET_URI: "http://mock-oauth2:8080/default/jwks"
      JWT_AUDIENCE: "transaction-api"
      # JWT_ISSUER intentionally unset for local: issuer validation is skipped.
